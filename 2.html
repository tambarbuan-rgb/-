<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<link rel="stylesheet" href="2.css">
    </head>
    <body>
        <h1>Responsive Registration Form</h1>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="repassword">Re-type Password</label>
                <input type="password" id="repassword" name="repassword" required>
            </div>
            <div class="form-group inline-fields">
                <div>
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                <div>
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
            </div>
            <div class="form-group gender-options">
                <label>
                    <input type="radio" name="gender" value="male" required> Male
                </label>
                <label>
                    <input type="radio" name="gender" value="female" required> Female
                </label>
            </div>
            <div class="form-group">
                <label for="country">Select a country</label>
                <select id="country" name="country" required>
                    <option value="">-- Select a country --</option>
                    <option value="usa">United States</option>
                    <option value="canada">Canada</option>
                    <option value="uk">United Kingdom</option>
                    <!-- Добавьте другие страны по необходимости -->
                </select>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="terms
                    " required> I agree with terms and conditions
                </label>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="newsletter"> I want to receive the newsletter
                </label>
            </div>
            <button type="submit">Register</button>
        </form>
    </body>
</html>
